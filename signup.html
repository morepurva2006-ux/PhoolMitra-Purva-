<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phool Mitra | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #b05d76; --bg-soft: #fff9fa; }
        body { font-family: 'Lato', sans-serif; background: var(--bg-soft); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background: white; padding: 40px; width: 400px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
        h2 { font-family: 'Playfair Display', serif; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #8a405a; }
    </style>
</head>
<body>

<div class="signup-box">
    <h2>Create Account</h2>
    <form id="signupForm">
        <input type="text" id="username" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn">REGISTER</button>
    </form>
    <p style="text-align:center"><a href="Phool-Mitra.html" style="color:#666; font-size: 0.9rem;">Back to Login</a></p>
</div>

<script>
    document.getElementById('signupForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const userData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('http://localhost:5000/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const result = await response.json();
            if (response.ok) {
                alert("Account Created Successfully! 🌸");
                window.location.href = 'Phool-Mitra.html'; // Redirect to login
            } else {
                alert(result.message);
            }
        } catch (err) {
            alert("Error: Is your server.js running?");
        }
    };
</script>

</body>
</html>
